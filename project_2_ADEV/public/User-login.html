<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Account | ADOPET</title>
    <script src="./js/adoption.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="login-body"> 
    <div class="login-container"> 
        <img class="logo-pic" src="images/adopet_logo.jpeg" alt="ADOPET logo">

        <h2>Create an Account</h2>

        <form id="loginForm" onsubmit="return LoginUser()">

            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter Username" name="user_name" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter Password" name="password" required>

            <label for="email">email</label>
            <input type="email" id="email" placeholder="dooby@gmail.com" name = "email" required>


<div class="button-container">
    <button type="submit" class="btn-full-width">Sign up</button>
    
    <button type="button" class="btn-full-width cancelbtn" onclick="window.location.href='Pet-gallery.html'">Gallery</button>
</div>

        </form>

    </div> </body>
</html>
